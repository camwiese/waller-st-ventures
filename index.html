<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waller St Ventures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #FAFAF7;
      --text: #2C3E2D;
      --text-light: #6B7C6C;
      --yellow: #e8b630;
      --terracotta: #c4724a;
      --sage: #6a8c5b;
      --sky: #7bafd4;
    }

    html {
      font-size: 16px;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 600px;
      width: 100%;
      opacity: 0;
      animation: fadeIn 1.6s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }

    .image-wrapper {
      width: 260px;
      height: 260px;
      overflow: hidden;
      border-radius: 6px;
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: fadeIn 1.8s cubic-bezier(0.25, 0.1, 0.25, 1) 0.2s forwards;
      box-shadow: 0 4px 24px rgba(44, 62, 45, 0.08);
    }

    .image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .brand {
      font-family: 'Cormorant Garamond', 'Georgia', serif;
      font-weight: 400;
      font-size: 1.1rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
      opacity: 0;
      animation: fadeIn 1.8s cubic-bezier(0.25, 0.1, 0.25, 1) 0.5s forwards;
    }

    .divider {
      width: 36px;
      height: 2px;
      background-color: var(--yellow);
      border-radius: 1px;
      margin: 1.5rem 0;
      opacity: 0;
      animation: fadeIn 1.8s cubic-bezier(0.25, 0.1, 0.25, 1) 0.7s forwards;
    }

    .contact {
      opacity: 0;
      animation: fadeIn 1.8s cubic-bezier(0.25, 0.1, 0.25, 1) 0.9s forwards;
    }

    .contact a {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: var(--text-light);
      text-decoration: none;
      transition: color 0.4s ease;
    }

    .contact a:hover {
      color: var(--terracotta);
    }

    /* AngelList Syndicate — uncomment when ready
    .syndicate {
      margin-top: 1.2rem;
      opacity: 0;
      animation: fadeIn 1.8s cubic-bezier(0.25, 0.1, 0.25, 1) 1.3s forwards;
    }

    .syndicate a {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-light);
      text-decoration: none;
      transition: color 0.4s ease;
    }

    .syndicate a:hover {
      color: var(--terracotta);
    }
    */

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .image-wrapper {
        width: 200px;
        height: 200px;
        margin-bottom: 1.5rem;
      }

      .brand {
        font-size: 0.95rem;
        letter-spacing: 0.28em;
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="container">

      <div class="image-wrapper">
        <img src="waller-st.jpg" alt="Waller St Ventures" />
      </div>

      <h1 class="brand">Waller St Ventures</h1>

      <div class="divider"></div>

      <div class="contact">
        <a href="mailto:hello@wallerstreetventures.com">hello@wallerstreetventures.com</a>
      </div>

      <!-- AngelList Syndicate — uncomment when ready
      <div class="syndicate">
        <a href="https://angel.co/syndicate/YOUR-SYNDICATE" target="_blank" rel="noopener">Syndicate ↗</a>
      </div>
      -->

    </div>
  </div>

</body>
</html>
